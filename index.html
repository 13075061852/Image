<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- AI 分析结果样式 -->
    <style>
        #ai-chat-messages .ai-heading {
            margin-top: 12px;
            margin-bottom: 4px;
            font-size: 16px;
            font-weight: 700;
            color: #111827;
        }
        #ai-chat-messages .ai-item {
            margin: 2px 0 2px 16px;
            font-size: 14px;
            font-weight: 500;
            color: #1f2937;
        }
        #ai-chat-messages .ai-text {
            margin: 2px 0;
            font-size: 14px;
            color: #4b5563;
        }
        #ai-chat-messages .ai-list {
            margin: 4px 0 4px 20px;
            padding-left: 16px;
        }
        #ai-chat-messages .ai-list-item {
            font-size: 14px;
            color: #374151;
            margin: 2px 0;
        }
        #ai-chat-messages .ai-table {
            width: 100%;
            border-collapse: collapse;
            margin: 8px 0 12px;
            font-size: 13px;
        }
        #ai-chat-messages .ai-table th,
        #ai-chat-messages .ai-table td {
            border: 1px solid #e5e7eb;
            padding: 6px 8px;
            text-align: left;
        }
        #ai-chat-messages .ai-table th {
            background-color: #f3f4f6;
            font-weight: 600;
            color: #111827;
        }
        #ai-chat-messages .ai-table td {
            background-color: #ffffff;
        }
        /* 增强对比度：斑马纹、悬停高亮、外框阴影 */
        #ai-chat-messages .ai-table tbody tr:nth-child(even) td {
            background-color: #f8fafc;
        }
        #ai-chat-messages .ai-table tbody tr:hover td {
            background-color: #eef2ff;
        }
        #ai-chat-messages .ai-table {
            background-color: #ffffff;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 6px 18px rgba(15, 23, 42, 0.08);
        }
        #ai-chat-messages .ai-table th,
        #ai-chat-messages .ai-table td {
            border-color: #d1d5db;
        }
        #ai-chat-messages .ai-separator {
            border: none;
            border-top: 1px dashed #e5e7eb;
            margin: 10px 0;
        }
        #ai-chat-messages code {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-size: 12px;
            background-color: #f3f4f6;
            border-radius: 3px;
            padding: 0 3px;
        }
    </style>
</head>
<body>

<div id="sidebar">
    <h3>Image Gallery</h3>
    <div id="all-category-btn" class="nav-item active" onclick="filterCategory('all')">全部</div>
    <div id="category-list"></div>
    <hr style="width:100%; border:0; border-top:1px solid rgba(255,255,255,0.1); margin: 24px 0;">
    <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()" style="width: 100%; margin-top: auto; border-radius: 14px; padding: 16px 20px; font-size: 16px; font-weight: 600; background: linear-gradient(135deg, #10b981 0%, #059669 100%);">+ 上传图片</button>
    <input type="file" id="fileInput" hidden multiple accept="image/*">
</div>

<div id="main">
    <header>
        <h2 id="current-category">全部图片</h2>
        <div class="toolbar">
            <!-- 搜索框 -->
            <div class="search-container">
                <input type="text" id="search-input" placeholder="名称、标签、分类" oninput="performSearch()">
            </div>
            <!-- 菜单栏 -->
            <button class="btn btn-secondary" onclick="toggleSelectAll()" id="toggle-select-btn">✓ 全选</button>
            <button class="btn btn-primary" onclick="toggleModeFilter()" id="mode-toggle-btn">📊 ALL</button>
            <div class="dropdown">
                <button class="btn btn-more">⋮ 更多</button>
                <div class="dropdown-content">
                    <button class="btn btn-danger" onclick="deleteSelected()">🗑️ 删除选中</button>
                    <button class="btn btn-compare" onclick="openCompare()">🔍 对比分析</button>
                    <button class="btn btn-primary" onclick="showCategoryManagementModal()" id="manage-cat-btn">📁 分类管理</button>
                    <button class="btn btn-ai" onclick="openAIAnalysis()">🤖 AI分析</button>
                <button class="btn btn-config" onclick="showAPIConfigModal()">⚙️ 配置API</button>
                    <button class="btn btn-print" onclick="printSelected()">🖨️ 打印选中</button>
                    <button class="btn btn-export" onclick="exportSelected()">📤 导出选中</button>
                    <button class="btn btn-import" onclick="showImportDialog()">📥 导入数据</button>
                </div>
            </div>
                    
            <!-- 响应式菜单按钮，屏幕窄时显示 -->
            <button class="menu-toggle-btn" onclick="handleMenuToggle(event)">
                <span class="menu-icon">☰</span>
            </button>
        </div>
        
        <!-- 响应式菜单面板 -->
        <div class="responsive-menu-panel" id="responsive-menu-panel">
            <button class="btn btn-secondary" onclick="toggleSelectAll()" id="mobile-toggle-select-btn">✓ 全选</button>
            <button class="btn btn-primary" onclick="toggleModeFilter()" id="mobile-mode-toggle-btn">📊 ALL</button>
            <button class="btn btn-compare" onclick="openCompare()">🔍 对比分析</button>
            <button class="btn btn-ai" onclick="openAIAnalysis()">🤖 AI分析</button>
            <button class="btn btn-print" onclick="printSelected()">🖨️ 打印选中</button>
            <button class="btn btn-export" onclick="exportSelected()">📤 导出选中</button>
            <button class="btn btn-danger" onclick="deleteSelected()">🗑️ 删除选中</button>
            <button class="btn btn-primary" onclick="showCategoryManagementModal()">📁 分类管理</button>
            <button class="btn btn-import" onclick="showImportDialog()">📥 导入数据</button>
        </div>
    </header>
    
    <div id="sub-category-container"></div>
    
    <div id="gallery"></div>
</div>

<!-- 对比蒙层 -->
<div id="compare-overlay">
    <div class="compare-header">
        <div>
            <h3>对比分析视图</h3>
            <small style="color: rgba(255,255,255,0.6); font-size: 12px; margin-top: 4px; display: block;">
                提示：使用 ← → 箭头键切换页面，ESC 退出
            </small>
        </div>
        <div class="compare-controls">
            <button class="btn btn-secondary" onclick="toggleZoomView()">🔍 放大视图</button>
            <button class="btn btn-danger" onclick="closeCompare()">退出对比</button>
        </div>
    </div>
    <div class="compare-container" id="compare-container"></div>
</div>

<!-- 放大查看蒙层 -->
<div id="zoom-overlay" class="hidden" onclick="closeZoom(event)">
    <div class="zoom-content">
        <div class="zoom-sidebar" onclick="event.stopPropagation()">
            <div id="zoom-list"></div>
        </div>
        <div class="zoom-main">
            <img id="zoom-image" src="" alt="">
            <div id="zoom-title" class="zoom-title"></div>
        </div>
    </div>
</div>

<!-- Toast 通知组件 -->
<div id="toast-container"></div>

<!-- 图片详情弹窗 -->
<div id="detail-overlay" class="detail-overlay" onclick="closeDetail(event)">
    <div class="detail-content" onclick="event.stopPropagation()">
        <div class="detail-header">
            <h3>图片详情</h3>
            <button type="button" class="detail-close-btn" onclick="closeDetail()" aria-label="关闭">&times;</button>
        </div>
        <div class="detail-body">
            <div class="detail-image-wrapper">
                <div class="detail-image-container">
                    <img id="detail-image" class="detail-image" src="" alt="">
                </div>
            </div>
            <div class="detail-form">
                <div class="detail-form-row">
                    <div class="detail-form-group">
                        <label>图片名称</label>
                        <input type="text" id="detail-name" readonly class="detail-input">
                    </div>
                    <div class="detail-form-group">
                        <label>主分类</label>
                        <select id="detail-category" class="detail-input detail-select"></select>
                    </div>
                </div>
                <div class="detail-form-group">
                    <label>标签</label>
                    <div class="detail-tags-row">
                        <input type="text" id="detail-tags-input" class="detail-input detail-tags-input" placeholder="输入标签后按回车添加" onkeypress="if(event.key==='Enter'){event.preventDefault();addTagToDetail();}">
                        <button type="button" class="detail-tags-add-btn" onclick="addTagToDetail()">添加</button>
                    </div>
                    <div id="detail-tags-container" class="detail-tags-container"></div>
                </div>
                <div class="detail-form-group">
                    <label>创建日期</label>
                    <input type="text" id="detail-date" readonly class="detail-input">
                </div>
            </div>
        </div>
        <div class="detail-footer">
            <button type="button" class="btn btn-secondary" onclick="closeDetail()">取消</button>
            <button type="button" class="btn btn-primary" onclick="saveDetail()">保存</button>
        </div>
    </div>
</div>

<!-- 全新设计的分类管理模态窗口 -->
<div id="category-management-modal" class="modal-overlay-new" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; backdrop-filter: blur(5px);">
    <div class="modal-content-new">
        <!-- 模态窗口头部 -->
        <div class="modal-header-new">
            <div class="modal-title-section">
                <h3>📂 分类与标签管理</h3>
                <p>管理您的图片分类和标签系统</p>
            </div>
            <button id="close-category-modal" class="modal-close-btn">×</button>
        </div>
        
        <!-- 标签页导航 -->
        <div class="tab-navigation">
            <button class="tab-link active" data-tab="categories">主分类</button>
            <button class="tab-link" data-tab="tags">标签</button>
        </div>
        
        <!-- 标签页内容 -->
        <div class="tab-content">
            <!-- 主分类管理 -->
            <div id="categories" class="tab-pane-new active">
                <div class="section-header">
                    <h4>管理主分类</h4>
                    <div class="actions">
                        <input type="text" id="new-category-input" placeholder="输入新分类名称" class="input-field">
                        <button id="add-category-btn" class="btn-primary">+ 添加分类</button>
                    </div>
                </div>
                <div id="categories-list" class="items-list"></div>
            </div>
            
            <!-- 标签管理 -->
            <div id="tags" class="tab-pane-new">
                <div class="section-header">
                    <h4>管理标签</h4>
                    <div class="actions">
                        <input type="text" id="new-tag-input-modal" placeholder="输入新标签名称" class="input-field">
                        <button id="add-tag-btn" class="btn-primary">+ 添加标签</button>
                    </div>
                </div>
                <div id="tags-list" class="items-list"></div>
            </div>
        </div>
    </div>
</div>

<!-- 重命名对话框 -->
<div id="rename-dialog" class="dialog-overlay" style="display: none;">
    <div class="dialog-content">
        <div class="dialog-header">
            <h4>编辑名称</h4>
            <button id="close-rename-dialog" class="dialog-close">×</button>
        </div>
        <div class="dialog-body">
            <input type="text" id="rename-input" placeholder="输入新名称" class="input-field">
        </div>
        <div class="dialog-footer">
            <button id="cancel-rename" class="btn-secondary">取消</button>
            <button id="confirm-rename" class="btn-primary">确认</button>
        </div>
    </div>
</div>

<!-- 确认对话框 -->
<div id="confirm-dialog" class="dialog-overlay" style="display: none;">
    <div class="dialog-content">
        <div class="dialog-header">
            <h4>确认操作</h4>
            <button id="close-confirm-dialog" class="dialog-close">×</button>
        </div>
        <div class="dialog-body">
            <p id="confirm-message">确认执行此操作？</p>
        </div>
        <div class="dialog-footer">
            <button id="cancel-confirm" class="btn-secondary">取消</button>
            <button id="confirm-action" class="btn-danger">确认</button>
        </div>
    </div>
</div>

<!-- AI分析界面 -->
<div id="ai-analysis-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; backdrop-filter: blur(5px);">
    <div class="ai-analysis-container" style="width: 90%; max-width: 1200px; height: 90%; margin: 5vh auto; background: white; border-radius: 16px; overflow: hidden; display: flex; flex-direction: column;">
        <!-- 头部 -->
        <div class="ai-analysis-header" style="padding: 24px; background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); color: white; display: flex; justify-content: space-between; align-items: center;">
            <h3 style="margin: 0; font-size: 20px; font-weight: 600;">🤖 AI分析</h3>
            <button onclick="closeAIAnalysis()" style="background: rgba(255,255,255,0.2); border: none; color: white; width: 40px; height: 40px; border-radius: 50%; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s;">×</button>
        </div>
        
        <!-- 内容区域 -->
        <div class="ai-analysis-body" style="flex: 1; display: flex; overflow: hidden;">
            <!-- 左侧图片区域 -->
            <div class="ai-image-section" style="width: 40%; padding: 24px; border-right: 1px solid #e2e8f0; overflow-y: auto;">
                <h4 style="margin: 0 0 16px 0; font-size: 16px; color: #1e293b;">选中的图片</h4>
                <div id="ai-selected-images" style="display: flex; flex-direction: column; gap: 16px;"></div>
            </div>
            
            <!-- 右侧分析结果区域 -->
            <div class="ai-result-section" style="flex: 1; display: flex; flex-direction: column;">
                <!-- 对话区域 -->
                <div id="ai-chat-messages" style="flex: 1; padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px;"></div>
                
                <!-- 输入区域 -->
                <div class="ai-input-section" style="padding: 24px; border-top: 1px solid #e2e8f0; display: flex; gap: 12px;">
                    <input type="text" id="ai-input" placeholder="输入问题或继续对话..." style="flex: 1; padding: 12px 16px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; outline: none; transition: border-color 0.2s;">
                    <button id="ai-send-btn" onclick="sendAIMessage()" style="padding: 12px 24px; background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.2s;">发送</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- AI 左侧图片放大层：点击左侧图片后全屏显示，右上角取消 -->
<div id="ai-image-zoom-overlay" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2100; align-items: center; justify-content: center;">
    <button type="button" id="ai-image-zoom-close" aria-label="关闭" style="position: absolute; top: 16px; right: 16px; width: 44px; height: 44px; border: none; border-radius: 50%; background: rgba(255,255,255,0.2); color: white; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 1;">×</button>
    <img id="ai-image-zoom-img" src="" alt="" style="max-width: 92vw; max-height: 88vh; object-fit: contain;">
</div>

<!-- API配置模态窗口 -->
<div id="api-config-modal" class="dialog-overlay api-config-overlay" style="display: none;">
    <div class="dialog-content api-config-dialog">
        <div class="api-config-header">
            <div class="api-config-title-wrap">
                <span class="api-config-icon">⚙️</span>
                <h4 class="api-config-title">API 配置</h4>
                <p class="api-config-desc">配置豆包 API 密钥与模型，用于 AI 分析与对话</p>
            </div>
            <button type="button" id="close-api-config-dialog" class="api-config-close" onclick="closeAPIConfigModal()" aria-label="关闭">×</button>
        </div>
        <div class="api-config-body">
            <div class="api-config-field">
                <label for="doubao-api-key">豆包 API 密钥</label>
                <input type="password" id="doubao-api-key" placeholder="请输入 API Key（Bearer Token）" class="api-config-input" autocomplete="off">
            </div>
            <div class="api-config-field">
                <label for="doubao-api-model">模型 / 端点</label>
                <select id="doubao-api-model" class="api-config-input">
                    <option value="ep-20260313102318-lcm5t">豆包</option>
                </select>
            </div>
        </div>
        <div class="api-config-footer">
            <button type="button" class="api-config-btn api-config-btn-cancel" onclick="closeAPIConfigModal()">取消</button>
            <button type="button" class="api-config-btn api-config-btn-save" onclick="saveAPIConfig()">保存配置</button>
        </div>
    </div>
</div>
<style>
.api-config-overlay .api-config-dialog { max-width: 480px; width: 95vw; }
.api-config-header {
    padding: 20px 24px;
    background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
    color: #fff;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
}
.api-config-title-wrap { flex: 1; min-width: 0; }
.api-config-icon { font-size: 24px; display: block; margin-bottom: 6px; }
.api-config-title { margin: 0; font-size: 18px; font-weight: 600; }
.api-config-desc { margin: 6px 0 0; font-size: 13px; opacity: 0.9; line-height: 1.4; }
.api-config-close {
    flex-shrink: 0;
    width: 36px; height: 36px;
    border: none;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    color: #fff;
    font-size: 20px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, transform 0.2s;
}
.api-config-close:hover { background: rgba(255,255,255,0.35); transform: scale(1.05); }
.api-config-body { padding: 24px; }
.api-config-field { margin-bottom: 20px; }
.api-config-field:last-child { margin-bottom: 0; }
.api-config-field label {
    display: block;
    margin-bottom: 8px;
    font-size: 14px;
    font-weight: 600;
    color: #334155;
}
.api-config-input {
    width: 100%;
    padding: 12px 14px;
    font-size: 14px;
    border: 2px solid #e2e8f0;
    border-radius: 10px;
    background: #fff;
    color: #1e293b;
    transition: border-color 0.2s, box-shadow 0.2s;
    box-sizing: border-box;
}
.api-config-input:focus {
    outline: none;
    border-color: #6366f1;
    box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
}
.api-config-input::placeholder { color: #94a3b8; }
.api-config-footer {
    padding: 20px 24px;
    background: #f8fafc;
    border-top: 1px solid #e2e8f0;
    display: flex;
    justify-content: flex-end;
    gap: 12px;
}
.api-config-btn {
    min-width: 100px;
    padding: 12px 20px;
    font-size: 15px;
    font-weight: 600;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
}
.api-config-btn-cancel {
    background: #fff;
    color: #64748b;
    border: 2px solid #e2e8f0;
}
.api-config-btn-cancel:hover {
    background: #f1f5f9;
    border-color: #cbd5e1;
    color: #475569;
}
.api-config-btn-save {
    background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
    color: #fff;
    box-shadow: 0 4px 12px rgba(79, 70, 229, 0.35);
}
.api-config-btn-save:hover {
    background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
    box-shadow: 0 6px 16px rgba(79, 70, 229, 0.45);
    transform: translateY(-1px);
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="script.js"></script>
<script src="ai.js"></script>
</body>
</html>
